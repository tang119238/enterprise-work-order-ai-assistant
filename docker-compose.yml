name: enterprise-work-order-ai-assistant

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: workorders
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev}
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD:-flyway_owner_dev}
      WORK_ORDER_DB_PASSWORD: ${WORK_ORDER_DB_PASSWORD:-work_order_app_dev}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD:-ai_app_dev}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD:-analytics_reader_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - work-order-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

  work-order-service:
    build:
      context: ./apps/work-order-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/workorders
      DB_USERNAME: work_order_app
      DB_PASSWORD: ${WORK_ORDER_DB_PASSWORD:-work_order_app_dev}
      SPRING_FLYWAY_ENABLED: "false"
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70.0
    depends_on:
      work-order-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    ports:
      - "127.0.0.1:8080:8080"

  pgvector-bootstrap:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    restart: "no"
    environment:
      PGVECTOR_ADMIN_DATABASE_URL: ${PGVECTOR_ADMIN_DATABASE_URL:-postgresql+asyncpg://postgres:postgres_dev@postgres:5432/workorders}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.pgvector_bootstrap"]

  work-order-migrate:
    image: flyway/flyway:10.20.1
    restart: "no"
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/workorders
      FLYWAY_USER: flyway_owner
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD:-flyway_owner_dev}
    depends_on:
      pgvector-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./apps/work-order-service/src/main/resources/db/migration:/flyway/sql:ro
    command: ["migrate"]

  ai-migrate:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    restart: "no"
    environment:
      AI_MIGRATION_DATABASE_URL: ${AI_MIGRATION_DATABASE_URL:-postgresql+asyncpg://flyway_owner:flyway_owner_dev@postgres:5432/workorders}
    depends_on:
      work-order-migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-offline}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}
      WORK_ORDER_BASE_URL: http://work-order-service:8080
      AI_DATABASE_URL: ${AI_DATABASE_URL:-postgresql+asyncpg://ai_app:ai_app_dev@postgres:5432/workorders}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-512}
      FASTEMBED_CACHE_PATH: /models
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
      KNOWLEDGE_PATH: /app/knowledge/policies
    volumes:
      - fastembed-cache:/models
    depends_on:
      ai-migrate:
        condition: service_completed_successfully
      work-order-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  work-order-data:
  fastembed-cache:
