name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  java-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: apps/work-order-service/pom.xml
      - name: Run Java tests
        working-directory: apps/work-order-service
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode test

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repository whitespace
        shell: bash
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ai-service/pyproject.toml
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -e "./apps/ai-service[dev]"
      - name: Run Python tests
        run: python -m pytest apps/ai-service/tests -q
      - name: Check lint and formatting
        run: |
          python -m ruff check apps/ai-service/app apps/ai-service/tests eval scripts
          python -m ruff format --check apps/ai-service/app apps/ai-service/tests eval scripts
      - name: Check Python types
        run: python -m mypy --config-file apps/ai-service/pyproject.toml apps/ai-service/app
      - name: Reject secrets, private paths, and customer identifiers
        shell: bash
        run: |
          if git grep -n -E '(sk-[A-Za-z0-9]{20,}|AKLT[A-Za-z0-9]{16,}|-----BEGIN (RSA |EC )?PRIVATE KEY-----)'; then
            echo "Potential secret detected"
            exit 1
          fi
          if git grep -n -E '(C:\\Users\\[^\\[:space:]]+|/Users/[^/[:space:]]+|卓越物业|亚软信息|中电鸿信)' -- . ':(exclude).github/workflows/ci.yml'; then
            echo "Private path or customer identifier detected"
            exit 1
          fi

  compose-acceptance:
    runs-on: ubuntu-latest
    needs: [java-tests, python-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and start the offline stack
        run: docker compose up --build --detach
      - name: Run smoke tests and 30-case evaluation
        run: |
          python scripts/smoke_test.py --wait-seconds 240
          python eval/run_eval.py --base-url http://localhost:8000 --output eval/report.json
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop the stack
        if: always()
        run: docker compose down --volumes
